name: Release

on:
  push:
    tags: ["v*"]

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          else
            NOTES=$(git log --pretty=format:"- %s" HEAD)
          fi
          echo "notes<<EOF" >> "$GITHUB_OUTPUT"
          echo "$NOTES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            # ${{ github.ref_name }}

            ## Changes
            ${{ steps.notes.outputs.notes }}

            ## Docker Images

            ```
            ghcr.io/${{ github.repository }}/forge-api:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/forge-web:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/beacon:${{ github.ref_name }}
            ```
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
