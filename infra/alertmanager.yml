global:
  resolve_timeout: 5m

route:
  group_by: ["alertname"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 1h
  receiver: "default"

receivers:
  - name: "default"
    # No external webhook configured yet.
    # Alerts are visible in the Alertmanager UI at http://localhost:9093.
    # To enable email/Slack/PagerDuty notifications, add your integration here.
