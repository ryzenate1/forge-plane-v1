# Host-installed nginx example for the GamePanel control plane.
# This file is not deployed by infra/compose.yml and has no envsubst entrypoint.
# Replace every __PANEL_FQDN__ token during host provisioning, and provide the
# referenced Let's Encrypt certificate files before enabling this configuration.

user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # -----------------------------------------------------------------
    # Rate limiting zones
    # -----------------------------------------------------------------
    limit_req_zone $binary_remote_addr zone=api:10m  rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

    # -----------------------------------------------------------------
    # Logging
    # -----------------------------------------------------------------
    log_format main '$time_local $remote_addr $host $request_method '
                    '$uri $status $body_bytes_sent $request_time';
    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log  warn;

    # -----------------------------------------------------------------
    # Gzip
    # -----------------------------------------------------------------
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_min_length   1024;
    gzip_types        text/plain
                      text/css
                      application/json
                      application/javascript
                      text/xml
                      application/xml
                      application/xml+rss
                      text/javascript
                      image/svg+xml;

    # -----------------------------------------------------------------
    # HTTP -> HTTPS redirect
    # -----------------------------------------------------------------
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # -----------------------------------------------------------------
    # HTTPS server
    # -----------------------------------------------------------------
    server {
        listen 443 ssl http2;
        server_name __PANEL_FQDN__;

        ssl_certificate     /etc/letsencrypt/live/__PANEL_FQDN__/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/__PANEL_FQDN__/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options           DENY                                            always;
        add_header X-Content-Type-Options    nosniff                                         always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"               always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"      always;

        client_max_body_size    100m;
        proxy_connect_timeout   10s;
        proxy_send_timeout      300s;
        proxy_read_timeout      300s;

        # Common reverse-proxy headers
        proxy_http_version      1.1;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto   $scheme;

        # Auth endpoints: stricter rate limit (longest-prefix wins over /api/)
        location /api/v1/auth/ {
            limit_req zone=auth burst=5 nodelay;
            proxy_pass http://127.0.0.1:8080;
        }

        # Only the three realtime routes bypass the REST API rate limit.
        location ~ ^/api/v1/servers/[^/]+/ws/(console|stats|logs)$ {
            proxy_pass         http://127.0.0.1:8080;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering    off;

            # Defining proxy headers here disables inheritance, so repeat all
            # common headers alongside the WebSocket upgrade headers.
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        "upgrade";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API (includes WebSocket proxying to daemon)
        location /api/ {
            proxy_pass              http://127.0.0.1:8080;
            proxy_read_timeout      300s;
            client_max_body_size    100m;
            limit_req               zone=api burst=20 nodelay;
            proxy_buffers           16 32k;
            proxy_buffer_size       128k;
            proxy_busy_buffers_size 256k;
        }

        # Frontend
        location / {
            proxy_pass         http://127.0.0.1:3000;
            proxy_read_timeout 60s;
        }
    }
}