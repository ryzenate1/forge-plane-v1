global:
  scrape_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    metrics_path: /api/v1/metrics
    static_configs:
      - targets: ["api:8080"]
  - job_name: daemon
    metrics_path: /metrics
    static_configs:
      - targets: ["daemon:9090"]
